services:
  - type: web
    name: black-team
    runtime: node
    plan: free
    region: ohio
    buildCommand: npm ci --include=dev && npx prisma generate && npm run build
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: black-team-db
          property: connectionString
      - key: APP_BASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: SENDGRID_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: EMAIL_FROM_NAME
        sync: false

databases:
  - name: black-team-db
    plan: free
    region: ohio
    postgresMajorVersion: "16"
