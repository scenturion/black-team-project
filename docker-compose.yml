version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: bjj_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bjj_administrator
    ports:
      - "5432:5432"
    volumes:
      - bjj_pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  bjj_pgdata:
